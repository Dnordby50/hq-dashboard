[build]
  functions = "netlify/functions"
  publish = "."

[build.environment]
  # Tell Netlify's secret scanner that this Google Sheets API key value is intentional.
  # The key is restricted in Google Cloud Console to (a) Google Sheets API only and
  # (b) HTTP referrer prescottepoxy.netlify.app/*, so exposing it in the client bundle is safe by design.
  # NOTE: after the domain rename, the referrer restriction in Google Cloud Console must be updated
  # to prescottepoxy.netlify.app/* or Maps/Sheets calls from the new domain will be rejected (Dylan handoff).
  # If the key is rotated again, update both index.html line 1845 and this value.
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyBUqdRk4eliEoc0vXK7XZz-4TiGdxnoGIY"

[functions]
  node_bundler = "esbuild"

# Daily auto-status sweep: flips public.jobs.status from 'scheduled' to
# 'in_progress' for jobs whose pec_prod_jobs.install_date is today.
# 13:00 UTC = 06:00 MST (project is single-timezone, no DST).
[functions."pec-auto-progress"]
  schedule = "0 13 * * *"

# Clean URL for the MCP server so the Claude.ai connector and Claude Code
# .mcp.json can point at https://<site>/mcp instead of /.netlify/functions/mcp.
[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

# OAuth 2.1 client_credentials + RFC 9728 protected-resource discovery for the
# MCP server. Anthropic's custom connector UI uses OAuth Client ID + Secret;
# the function branches on path. The /mcp/.well-known/* duplicates exist
# because some MCP clients probe relative to the protected-resource URL rather
# than the issuer root.
[[redirects]]
  from = "/.well-known/oauth-authorization-server"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/.well-known/oauth-protected-resource"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/mcp/.well-known/oauth-authorization-server"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/mcp/.well-known/oauth-protected-resource"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

# RFC 8414 / 9728 canonical "path-insertion" form: the well-known segment is
# inserted BEFORE the resource path (/mcp). Some clients build this URL
# themselves rather than following the resource_metadata URL we advertise in
# the WWW-Authenticate header, so serve it too.
[[redirects]]
  from = "/.well-known/oauth-authorization-server/mcp"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/.well-known/oauth-protected-resource/mcp"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/oauth/token"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/oauth/authorize"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/register"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

# Public hosted invoice page. /pay/<token> rewrites to the function with the
# token in the query string (event.queryStringParameters.token).
[[redirects]]
  from = "/pay/*"
  to = "/.netlify/functions/pec-public-invoice?token=:splat"
  status = 200
  force = true

# Vendored, version-pinned libraries (e.g. self-hosted supabase-js). The
# filename carries the version, so a new version means a new filename -- cache
# hard. Served as a normal static file (no redirect intercepts /vendor/*).
[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# The whole app is one big index.html. Always revalidate the HTML entry point so
# a deploy is picked up on the next load instead of serving a stale bundle (the
# recurring "it's not fixed" reports were the browser/CDN holding an old
# index.html). Hashed/versioned assets like /vendor/* stay cached hard above.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
